name: UnRC remotedialer-proxy

# Cuts the GA tag for the in-flight remotedialer-proxy rc and propagates
# it through chart into rancher. This is the same DAG as
# cascade-rancher-chart-remotedialer-proxy.yaml — only the cascade-mid
# prompt for remotedialer-proxy differs: instead of suggesting the next rc
# (v0.5.0-rc.5), this workflow asks for the rc-stripped GA tag
# (v0.5.0-rc.4 → v0.5.0). Pick this workflow when the team is ready to
# unRC; pick the cascade-* variant while still iterating on rcs.
#
# remotedialer-proxy is treated as a black box at the bottom of this
# sub-DAG: the cascade picks it up at its latest paired tag (no
# explicit-version input needed). The operator still cuts the actual tag
# in remotedialer-proxy's own Release workflow — the reconciler only
# suggests it.

on:
  workflow_dispatch:
    inputs:
      rancher_branch:
        description: 'leaf rancher branch the cascade lands on (e.g. main, release/v2.13)'
        required: true
        type: string

# Share the reconciler lock — cascade mutates trackers that cron and
# tag-emitted touch, so runs must not race. Concurrent specialized cascades
# are allowed (different config: labels keep their issues isolated) but they
# still serialize against each other so two tracker rewrites don't race.
concurrency:
  group: reconciler
  cancel-in-progress: false

permissions: {}

jobs:
  cascade:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'

      - name: Install yq
        # Required by the embedded {bump,chart-bump}-remotedialer-proxy.sh
        # strategy scripts. Matches the upstream remotedialer-proxy
        # workflows' install method.
        run: sudo snap install yq --channel=v4/stable

      - name: Read App credentials from Vault
        uses: rancher-eio/read-vault-secrets@main
        with:
          secrets: |
            secret/data/github/repo/rancher/${{ github.repository }}/github/pr-actions-write-app/credentials appId | APPID ;
            secret/data/github/repo/rancher/${{ github.repository }}/github/pr-actions-write-app/credentials privateKey | PRIVATEKEY

      - name: Mint GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ env.APPID }}
          private-key: ${{ env.PRIVATEKEY }}
          owner: ${{ github.repository_owner }}

      - name: Run reconciler (cascade, unrc remotedialer-proxy)
        env:
          AUTOMATION_REPO: ${{ github.repository }}
          GH_BOT_TOKEN: ${{ steps.app-token.outputs.token }}
          RANCHER_BRANCH: ${{ inputs.rancher_branch }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          go run ./cmd/reconciler \
            -mode=cascade \
            -config=rancher-chart-remotedialer-proxy-unrc \
            -leaf-branch="$RANCHER_BRANCH"
