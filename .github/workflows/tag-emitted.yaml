name: Reconciler (tag-emitted)

# Fast path. Fired by each source repo's Release workflow via
# `repository_dispatch` immediately after a tag lands, so the tracker issue
# and downstream bump PRs appear within ~30s of the tag.
#
# Payload (client_payload) shape:
#   { repo: "rancher/steve", tag: "v0.7.5", sha: "abcd123..." }
#
# Cron reconciler.yaml is the safety net — this workflow is the optimization.

on:
  repository_dispatch:
    types: [tag-emitted]

# Share the lock with reconciler.yaml: at most one run touching trackers at
# any moment.
concurrency:
  group: reconciler
  cancel-in-progress: false

permissions: {}

jobs:
  reconcile:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Validate payload
        env:
          REPO: ${{ github.event.client_payload.repo }}
          TAG: ${{ github.event.client_payload.tag }}
        run: |
          if [ -z "$REPO" ] || [ -z "$TAG" ]; then
            echo "::error::client_payload missing required fields {repo, tag}"
            exit 1
          fi
          # Defense in depth: only react to tags from repos we manage. The
          # PAT scope is the primary control; this rejects bogus dispatches
          # early with a clearer error.
          if ! grep -q "^  ${REPO##*/}:" dependencies.yaml 2>/dev/null; then
            : # dependencies.yaml not yet checked out; the reconciler will
              # validate properly. Skip the early check.
          fi

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'

      - name: Run reconciler (dispatch)
        env:
          AUTOMATION_REPO: ${{ github.repository }}
          GH_BOT_TOKEN: ${{ secrets.GH_BOT_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: |
          go run ./cmd/reconciler \
            -mode=dispatch \
            -repo='${{ github.event.client_payload.repo }}' \
            -tag='${{ github.event.client_payload.tag }}' \
            -sha='${{ github.event.client_payload.sha }}'
