name: Reconciler (tag-emitted)

# Fast path. Fired by each source repo's Release workflow via
# `repository_dispatch` immediately after a tag lands, so the tracker issue
# and downstream bump PRs appear within ~30s of the tag.
#
# Payload (client_payload) shape:
#   { repo: "rancher/steve", tag: "v0.7.5", sha: "abcd123..." }
#
# Cron reconciler.yaml is the safety net — this workflow is the optimization.

on:
  repository_dispatch:
    types: [tag-emitted]

# Share the lock with reconciler.yaml: at most one run touching trackers at
# any moment.
concurrency:
  group: reconciler
  cancel-in-progress: false

permissions: {}

jobs:
  reconcile:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # rancher-eio/read-vault-secrets uses OIDC
    steps:
      - name: Validate payload
        env:
          REPO: ${{ github.event.client_payload.repo }}
          TAG: ${{ github.event.client_payload.tag }}
        run: |
          if [ -z "$REPO" ] || [ -z "$TAG" ]; then
            echo "::error::client_payload missing required fields {repo, tag}"
            exit 1
          fi
          # The PAT scope is the primary control over which repos can dispatch
          # this workflow. The reconciler iterates every dependencies/*.yaml
          # and silently ignores tags from repos that aren't in any config.

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'

      - name: Install yq
        # Required by the embedded {bump,chart-bump}-remotedialer-proxy.sh
        # strategy scripts. Matches the upstream remotedialer-proxy
        # workflows' install method.
        run: sudo snap install yq --channel=v4/stable

      - uses: rancher-eio/read-vault-secrets@0da85151ad1f19ed7986c41587e45aac1ace74b6 # v3
        with:
          secrets: |
            secret/data/github/repo/${{ github.repository }}/github/pr-actions-write-app/credentials appId | APPID ;
            secret/data/github/repo/${{ github.repository }}/github/pr-actions-write-app/credentials privateKey | PRIVATEKEY

      - uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        id: app-token
        with:
          app-id: ${{ env.APPID }}
          private-key: ${{ env.PRIVATEKEY }}
          owner: ${{ github.repository_owner }}

      - name: Run reconciler (dispatch)
        env:
          AUTOMATION_REPO: ${{ github.repository }}
          GH_BOT_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          go run ./cmd/reconciler \
            -mode=dispatch \
            -repo='${{ github.event.client_payload.repo }}' \
            -tag='${{ github.event.client_payload.tag }}' \
            -sha='${{ github.event.client_payload.sha }}'
