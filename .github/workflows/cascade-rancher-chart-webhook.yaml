name: Cascade (rancher-chart-webhook)

# Specialized cascade for the rancher ← chart ← webhook path. Walks just
# that sub-DAG to a chosen rancher branch — see
# dependencies/rancher-chart-webhook.yaml for the DAG.
#
# webhook is treated as a black box at the bottom of this sub-DAG: the
# cascade picks it up at its latest paired tag (no explicit-version input
# needed). For upgrades that need norman/wrangler bundled in the same
# cascade, use cascade-rancher.yaml against the canonical config.

on:
  workflow_dispatch:
    inputs:
      rancher_branch:
        description: 'leaf rancher branch the cascade lands on (e.g. main, release/v2.13)'
        required: true
        type: string

# Share the reconciler lock — cascade mutates trackers that cron and
# tag-emitted touch, so runs must not race. Concurrent specialized cascades
# are allowed (different config: labels keep their issues isolated) but they
# still serialize against each other so two tracker rewrites don't race.
concurrency:
  group: reconciler
  cancel-in-progress: false

permissions: {}

jobs:
  cascade:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'

      - name: Install yq
        # Required by the embedded {bump,chart-bump}-remotedialer-proxy.sh
        # strategy scripts. Skip if a yq is already on PATH (the GitHub
        # ubuntu-latest image ships mikefarah/yq at /usr/bin/yq, which is
        # what we want); only fall back to snap when nothing's installed.
        run: |
          if command -v yq >/dev/null 2>&1; then
            echo "yq already installed: $(yq --version) at $(command -v yq)"
            exit 0
          fi
          sudo snap install yq --channel=v4/stable

      - name: Debug yq + clone
        # Temporary diagnostic for the build.yaml-not-found failure during
        # the rancher webhook bump. Confirms yq v4 is on PATH and that a
        # fresh shallow clone of rancher/rancher main contains build.yaml.
        run: |
          which yq
          yq --version
          git clone --depth=1 --branch=main https://github.com/rancher/rancher.git /tmp/check
          ls /tmp/check/build.yaml
          yq -r '.webhookVersion' /tmp/check/build.yaml

      - name: Read App credentials from Vault
        uses: rancher-eio/read-vault-secrets@main
        with:
          secrets: |
            secret/data/github/repo/rancher/${{ github.repository }}/github/pr-actions-write-app/credentials appId | APPID ;
            secret/data/github/repo/rancher/${{ github.repository }}/github/pr-actions-write-app/credentials privateKey | PRIVATEKEY

      - name: Mint GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ env.APPID }}
          private-key: ${{ env.PRIVATEKEY }}
          owner: ${{ github.repository_owner }}

      - name: Run reconciler (cascade)
        env:
          AUTOMATION_REPO: ${{ github.repository }}
          GH_BOT_TOKEN: ${{ steps.app-token.outputs.token }}
          RANCHER_BRANCH: ${{ inputs.rancher_branch }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          go run ./cmd/reconciler \
            -mode=cascade \
            -config=rancher-chart-webhook \
            -leaf-branch="$RANCHER_BRANCH"
