name: Reconciler (cron)

# Safety-net sweep. Catches:
#   - upstream lib releases we don't dispatch (wrangler, lasso, ...)
#   - PR-state transitions (approval, CI flip, merge) on every open tracker
#   - drift on notify-only branches
#
# The fast path for tags we control is .github/workflows/tag-emitted.yaml,
# which runs within ~30s of a tag landing.

on:
  schedule:
    # Every 15 min, deliberately staggered off `:00 :15 :30 :45`. GitHub
    # actively delays (or silently drops) scheduled runs at the top of the
    # hour and other "round" minutes when the cron cluster is hot — the
    # `*/15` cadence is the most affected. Picking offset minutes avoids
    # the hot slots and gets us close to the intended cadence in practice.
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch: {}      # allow manual kick

# Serialize against tag-emitted.yaml so two reconciler runs never race on the
# same tracker issue / PR. cancel-in-progress: false — both runs must complete.
concurrency:
  group: reconciler
  cancel-in-progress: false

permissions: {}

jobs:
  reconcile:
    runs-on: ubuntu-latest
    permissions:
      contents: read   # checkout this repo
      id-token: write  # rancher-eio/read-vault-secrets uses OIDC
      issues: write    # tracker issues live in this repo
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'

      - uses: ./.github/actions/mint-tokens

      - name: Run reconciler
        env:
          AUTOMATION_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
        run: go run ./cmd/reconciler -mode=cron
