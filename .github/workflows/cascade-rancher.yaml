name: Cascade (rancher)

# Manual entrypoint for the canonical multi-source cascade: walk the broad
# rancher DAG (steve, webhook, remotedialer-proxy, wrangler, …) one stage
# at a time toward a chosen rancher branch. See dependencies/rancher.yaml
# for the DAG.
#
# Specialized narrower cascades live under their own workflows:
#   cascade-rancher-chart-webhook.yaml
#   cascade-rancher-chart-remotedialer-proxy.yaml
#
# Inputs:
#   - rancher_branch: required. The leaf branch the cascade lands on.
#   - One optional version input per known independent in this config
#     (currently: wrangler).
#
# When new independents are added to dependencies/rancher.yaml, add a
# matching input here and a matching shell branch below.

on:
  workflow_dispatch:
    inputs:
      rancher_branch:
        description: 'leaf rancher branch the cascade lands on (e.g. main, release/v2.13)'
        required: true
        type: string
      wrangler:
        description: 'optional: wrangler version (e.g. v0.5.2). Leave empty to skip an explicit wrangler bump.'
        required: false
        type: string
        default: ''

# Share the reconciler lock — cascade mutates trackers that cron and
# tag-emitted touch, so runs must not race.
concurrency:
  group: reconciler
  cancel-in-progress: false

permissions: {}

jobs:
  cascade:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # rancher-eio/read-vault-secrets uses OIDC
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'

      - name: Install yq
        # Required by the embedded {bump,chart-bump}-remotedialer-proxy.sh
        # strategy scripts. Matches the upstream remotedialer-proxy
        # workflows' install method.
        run: sudo snap install yq --channel=v4/stable

      - uses: rancher-eio/read-vault-secrets@0da85151ad1f19ed7986c41587e45aac1ace74b6 # v3
        with:
          secrets: |
            secret/data/github/repo/${{ github.repository }}/github/pr-actions-write-app/credentials appId | APPID ;
            secret/data/github/repo/${{ github.repository }}/github/pr-actions-write-app/credentials privateKey | PRIVATEKEY

      - uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        id: app-token
        with:
          app-id: ${{ env.APPID }}
          private-key: ${{ env.PRIVATEKEY }}
          owner: ${{ github.repository_owner }}

      - name: Run reconciler (cascade)
        # Inputs flow in via env to keep them out of the rendered shell —
        # values are user-controlled and we don't want them interpreted as
        # shell. INDEPS is built by appending name=version pairs for each
        # non-empty independent input.
        env:
          AUTOMATION_REPO: ${{ github.repository }}
          GH_BOT_TOKEN: ${{ steps.app-token.outputs.token }}
          RANCHER_BRANCH: ${{ inputs.rancher_branch }}
          WRANGLER: ${{ inputs.wrangler }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          INDEPS=""
          append() {
            if [ -n "$2" ]; then
              if [ -n "$INDEPS" ]; then
                INDEPS="$INDEPS,$1=$2"
              else
                INDEPS="$1=$2"
              fi
            fi
          }
          append wrangler "$WRANGLER"
          go run ./cmd/reconciler \
            -mode=cascade \
            -config=rancher \
            -leaf-branch="$RANCHER_BRANCH" \
            -independents="$INDEPS"
