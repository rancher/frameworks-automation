name: Cascade

# Manual entrypoint for a strategy-2 cascade: walk a (dep, version) up the
# DAG to a chosen rancher branch one stage at a time, opening bump PRs at
# each layer and prompting a re-tag at every intermediate layer (devs run
# the per-repo Release workflow with the next-patch version).
#
# Used at release prep or for behavior-altering bumps where every
# intermediate must CI against the new dep before shipping. Day-to-day
# bumps still go via the dispatch (auto-PR) path; cascades are opt-in.
#
# `dep`, `version`, `rancher_branch` are all required. The cascade tracker
# becomes the single URL to bookmark — it shows every stage's status and
# tag prompts as the cascade progresses.

on:
  workflow_dispatch:
    inputs:
      dep:
        description: 'source dep config-key (e.g. wrangler, lasso)'
        required: true
        type: string
      version:
        description: 'source dep version (e.g. v0.5.1)'
        required: true
        type: string
      rancher_branch:
        description: 'leaf rancher branch the cascade lands on (e.g. main, release/v2.13)'
        required: true
        type: string

# Share the reconciler lock — cascade mutates trackers that cron and
# tag-emitted touch, so runs must not race.
concurrency:
  group: reconciler
  cancel-in-progress: false

permissions: {}

jobs:
  cascade:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'

      - name: Run reconciler (cascade)
        # Inputs flow in via env to keep them out of the rendered shell —
        # values are user-controlled and we don't want them interpreted as
        # shell.
        env:
          AUTOMATION_REPO: ${{ github.repository }}
          GH_BOT_TOKEN: ${{ secrets.GH_BOT_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          DEP: ${{ inputs.dep }}
          VERSION: ${{ inputs.version }}
          RANCHER_BRANCH: ${{ inputs.rancher_branch }}
        run: |
          go run ./cmd/reconciler \
            -mode=cascade \
            -dep="$DEP" \
            -version="$VERSION" \
            -leaf-branch="$RANCHER_BRANCH"
