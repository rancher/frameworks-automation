name: Cascade

# Manual entrypoint for a multi-source cascade: walk the DAG one stage at a
# time toward a chosen rancher branch, opening bump PRs at each layer and
# prompting a re-tag at every intermediate layer (devs run the per-repo
# Release workflow with the next-patch version).
#
# Inputs:
#   - rancher_branch: required. The leaf branch the cascade lands on.
#   - One optional version input per known independent (currently: wrangler).
#     Empty means "don't include this independent" — the cascade still picks
#     up paired components (steve, etc.) at their latest tag for the matching
#     leaf branch.
#
# When new independents are added to dependencies.yaml, add a matching input
# here and a matching shell branch below.

on:
  workflow_dispatch:
    inputs:
      rancher_branch:
        description: 'leaf rancher branch the cascade lands on (e.g. main, release/v2.13)'
        required: true
        type: string
      wrangler:
        description: 'optional: wrangler version (e.g. v0.5.2). Leave empty to skip an explicit wrangler bump.'
        required: false
        type: string
        default: ''

# Share the reconciler lock — cascade mutates trackers that cron and
# tag-emitted touch, so runs must not race.
concurrency:
  group: reconciler
  cancel-in-progress: false

permissions: {}

jobs:
  cascade:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'

      - name: Install yq
        # Required by the embedded {bump,chart-bump}-remotedialer-proxy.sh
        # strategy scripts. Matches the upstream remotedialer-proxy
        # workflows' install method.
        run: sudo snap install yq --channel=v4/stable

      - name: Run reconciler (cascade)
        # Inputs flow in via env to keep them out of the rendered shell —
        # values are user-controlled and we don't want them interpreted as
        # shell. INDEPS is built by appending name=version pairs for each
        # non-empty independent input.
        env:
          AUTOMATION_REPO: ${{ github.repository }}
          GH_BOT_TOKEN: ${{ secrets.GH_BOT_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          RANCHER_BRANCH: ${{ inputs.rancher_branch }}
          WRANGLER: ${{ inputs.wrangler }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          INDEPS=""
          append() {
            if [ -n "$2" ]; then
              if [ -n "$INDEPS" ]; then
                INDEPS="$INDEPS,$1=$2"
              else
                INDEPS="$1=$2"
              fi
            fi
          }
          append wrangler "$WRANGLER"
          go run ./cmd/reconciler \
            -mode=cascade \
            -leaf-branch="$RANCHER_BRANCH" \
            -independents="$INDEPS"
