name: CI

# Pre-merge gates for this repo. Runs on every PR and on direct pushes to
# main so a fixup commit straight on main also gets validated. None of the
# jobs need write tokens — they only build, test, and parse local files.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# A PR that gets pushed to repeatedly cancels its in-flight CI run; only
# the latest commit's CI matters. The push-to-main branch keeps a stable
# group so back-to-back pushes serialize.
concurrency:
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  unit:
    name: vet, build, test, validate-config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        # Default suite only (integration tests are build-tagged off and
        # run by the integration job below).
        run: go test ./...

      - name: validate dependencies/*.yaml
        # Same code path the reconciler uses at startup: parse every
        # dependencies/<name>.yaml, apply defaults, run cfg.validate(),
        # enforce the one-leaf-per-config invariant.
        run: go run ./cmd/reconciler -mode=validate-config

  integration:
    # Slow path: clones rancher/rancher at a pinned SHA and replays the
    # cascade #19 stage-3 bump bundle through the real strategies. Kept
    # in a separate job so a failure (or a slow run) is distinguishable
    # from the cheap unit gates above.
    name: integration (rancher cascade-19 stage-3)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'

      - name: go test -tags=integration
        run: go test -tags=integration -run TestIntegration -timeout=15m -v ./internal/pr/
