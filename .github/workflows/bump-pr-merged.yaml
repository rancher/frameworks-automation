name: Reconciler (bump-pr-merged)

# Fast path for downstream bump-PR merges. Fired by each downstream repo's
# notify-bump-merged.yaml when a PR whose head branch starts with
# `automation/` is closed with merged == true. Lets pass 2 observe the
# merge transition (Slack post, tracker close) within ~30s instead of up
# to ~15 min on the next cron tick.
#
# Payload (client_payload) shape:
#   { repo: "tomleb/frameworks-automation-steve", pr: "42",
#     head_branch: "automation/bump-...", base_branch: "main" }
#
# Cron reconciler.yaml is the safety net — this workflow is the optimization.
# We use -mode=cron rather than a new mode: pass 2 (poll PRs, post Slack,
# close trackers) is exactly what we need, and the other passes are cheap
# no-ops when nothing else is in flight.

on:
  repository_dispatch:
    types: [bump-pr-merged]

# Share the lock with reconciler.yaml / tag-emitted.yaml / bump-*.yaml /
# cascade.yaml: at most one run touching trackers at any moment.
concurrency:
  group: reconciler
  cancel-in-progress: false

permissions: {}

jobs:
  reconcile:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Validate payload
        env:
          REPO: ${{ github.event.client_payload.repo }}
          PR: ${{ github.event.client_payload.pr }}
          HEAD: ${{ github.event.client_payload.head_branch }}
        run: |
          if [ -z "$REPO" ] || [ -z "$PR" ]; then
            echo "::error::client_payload missing required fields {repo, pr}"
            exit 1
          fi
          # Defense in depth: the real filter is on the downstream side
          # (only fires for automation/* branches). This rejects obviously
          # bogus dispatches before spinning up Go.
          case "$HEAD" in
            automation/*) ;;
            *) echo "::error::head_branch '$HEAD' is not an automation branch"; exit 1 ;;
          esac
          echo "Reconciling after merge of $REPO#$PR ($HEAD)"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'

      - name: Run reconciler (cron)
        env:
          AUTOMATION_REPO: ${{ github.repository }}
          GH_BOT_TOKEN: ${{ secrets.GH_BOT_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: go run ./cmd/reconciler -mode=cron
