# Same as norman_branch_ahead but rancher (the leaf) pins norman directly
# in addition to its steve pin. norman is now in propagation (branch-ahead
# detection), so rancher's bundle has BOTH deps as pending — neither is
# paired-latest because both repos will be re-tagged as part of the cascade.
#
# Resulting cascade (3 stages):
#   Stage 1: tag norman.
#   Stage 2: bump steve [norman→pending] + tag steve.
#   Stage 3: bump rancher [norman→pending, steve→pending] (final).

sources: []

stages:
  - layer: 1
    bumps: []
    tags:
      - {repo: norman, branch: main}
  - layer: 2
    bumps:
      - repo: steve
        branch: main
        deps:
          - {dep: norman, module: github.com/x/norman, version: ""}
    tags:
      - {repo: steve, branch: main}
  - layer: 3
    bumps:
      - repo: rancher
        branch: main
        deps:
          - {dep: norman, module: github.com/x/norman, version: ""}
          - {dep: steve, module: github.com/x/steve, version: ""}
    tags: []

issue:
  title: "[cascade:test] rancher main"
  labels:
    - cascade-op
    - "config:test"
    - "leaf:rancher:main"

prs_opened: []
