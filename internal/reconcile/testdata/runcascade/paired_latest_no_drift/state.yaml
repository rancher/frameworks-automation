automation_repo: rancher/release-automation
github_actor: tomleb

trigger:
  leaf_branch: main
  independents: {}

modules:
  rancher: [github.com/x/rancher]
  steve:   [github.com/x/steve]
  norman:  [github.com/x/norman]

# Negative-test baseline: every repo is fresh (branch HEAD == latest tag) AND
# every paired pin matches the upstream's latest tag. Pin-drift detection MUST
# NOT promote anything here — over-promotion would manifest as steve appearing
# in propagation and a spurious tag prompt for it.

repos:
  x/rancher:
    gh_repo: x/rancher
    default_branch: main
    tags: [v2.15.0]
    branches:
      main:
        files:
          go.mod: |
            module github.com/x/rancher
            go 1.24
            require github.com/x/steve v1.5.0
        ahead_of:
          v2.15.0: 0

  x/steve:
    gh_repo: x/steve
    default_branch: main
    tags: [v1.5.0]
    branches:
      main:
        files:
          # Steve pins norman at norman's CURRENT latest tag (v0.9.3).
          # No drift — should not be promoted.
          go.mod: |
            module github.com/x/steve
            go 1.24
            require github.com/x/norman v0.9.3
        ahead_of:
          v1.5.0: 0
    tag_files:
      v1.5.0:
        go.mod: |
          module github.com/x/steve
          go 1.24
          require github.com/x/norman v0.9.3

  x/norman:
    gh_repo: x/norman
    default_branch: main
    tags: [v0.9.3, v0.9.2, v0.9.1]
    branches:
      main:
        files:
          go.mod: |
            module github.com/x/norman
            go 1.24
        ahead_of:
          v0.9.3: 0
    tag_files:
      v0.9.3:
        go.mod: |
          module github.com/x/norman
          go 1.24
