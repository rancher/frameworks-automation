automation_repo: rancher/release-automation
github_actor: tomleb

# Empty independents. webhook is branch-ahead of its latest tag (v0.7.5),
# which is a GA — no -rc suffix. The rc strategy should fall back to the
# next patch's first rc, i.e. v0.7.6-rc.1.
trigger:
  leaf_branch: main
  independents: {}

modules:
  rancher: [github.com/x/rancher]
  webhook: [github.com/x/webhook]

repos:
  x/rancher:
    gh_repo: x/rancher
    default_branch: main
    tags: [v2.15.0]
    branches:
      main:
        files:
          go.mod: |
            module github.com/x/rancher
            go 1.24
            require github.com/x/webhook v0.7.5
        ahead_of:
          v2.15.0: 0

  x/charts:
    gh_repo: x/charts
    default_branch: dev-v2.15
    tags: []
    branches:
      dev-v2.15:
        files: {}

  x/webhook:
    gh_repo: x/webhook
    default_branch: main
    # Latest tag on the v0.7 minor is the GA v0.7.5 (the earlier rc tags are
    # included to confirm the GA outranks them).
    tags: [v0.7.5, v0.7.5-rc.2, v0.7.5-rc.1, v0.7.4]
    branches:
      main:
        files:
          go.mod: |
            module github.com/x/webhook
            go 1.24
        ahead_of:
          v0.7.5: 1
    tag_files:
      v0.7.5:
        go.mod: |
          module github.com/x/webhook
          go 1.24
