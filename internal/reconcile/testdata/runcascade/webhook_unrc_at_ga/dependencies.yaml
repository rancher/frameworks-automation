# Same DAG as webhook_unrc_no_drift: webhook's strategy is unrc.
repos:
  rancher:
    kind: leaf
    repo: x/rancher
    version-md: |
      | Rancher Branch | Rancher Minor |
      |---|---|
      | main | v2.15 |
    deps:
      - {name: chart, strategy: order}
      - {name: webhook, strategy: bump-webhook}
  chart:
    kind: paired
    repo: x/charts
    branch-template: "dev-{rancher-minor}"
    deps:
      - {name: webhook, strategy: chart-bump-webhook}
  webhook:
    kind: paired
    repo: x/webhook
    next-tag-strategy: unrc
    version-md: |
      | Webhook Branch | Webhook Minor | Matching Rancher Version |
      |---|---|---|
      | main | v0.7 | v2.15 |
    deps: []
