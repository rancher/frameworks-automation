automation_repo: rancher/release-automation
github_actor: tomleb

# Empty independents: the cascade is driven by webhook being branch-ahead of
# its latest released rc tag (v0.7.5-rc.1). detectStalePairedRepos picks this
# up and promotes webhook + chart + rancher into propagation.
trigger:
  leaf_branch: main
  independents: {}

modules:
  rancher: [github.com/x/rancher]
  webhook: [github.com/x/webhook]

repos:
  x/rancher:
    gh_repo: x/rancher
    default_branch: main
    tags: [v2.15.0]
    branches:
      main:
        files:
          go.mod: |
            module github.com/x/rancher
            go 1.24
            require github.com/x/webhook v0.7.5-rc.1
        ahead_of:
          v2.15.0: 0

  x/charts:
    gh_repo: x/charts
    default_branch: dev-v2.15
    tags: []
    branches:
      dev-v2.15:
        files: {}

  x/webhook:
    gh_repo: x/webhook
    default_branch: main
    # Latest tag is the highest rc on the v0.7 minor — predictNextRC should
    # return v0.7.5-rc.2.
    tags: [v0.7.5-rc.1, v0.7.4]
    branches:
      main:
        files:
          go.mod: |
            module github.com/x/webhook
            go 1.24
        # 1 commit past the latest rc → branch-ahead detection promotes
        # webhook into the cascade so it gets a new tag stage.
        ahead_of:
          v0.7.5-rc.1: 1
    tag_files:
      v0.7.5-rc.1:
        go.mod: |
          module github.com/x/webhook
          go 1.24
