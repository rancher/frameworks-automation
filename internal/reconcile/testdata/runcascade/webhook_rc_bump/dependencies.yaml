# rancher ← chart ← webhook sub-DAG mirroring
# dependencies/rancher-chart-webhook.yaml. webhook carries
# next-tag-strategy: rc so the cascade-mid tag prompt suggests bumping the
# rc.N suffix instead of the patch number.
repos:
  rancher:
    kind: leaf
    repo: x/rancher
    version-md: |
      | Rancher Branch | Rancher Minor |
      |---|---|
      | main | v2.15 |
    deps:
      - {name: chart, strategy: order}
      - {name: webhook, strategy: bump-webhook}
  chart:
    kind: paired
    repo: x/charts
    branch-template: "dev-{rancher-minor}"
    deps:
      - {name: webhook, strategy: chart-bump-webhook}
  webhook:
    kind: paired
    repo: x/webhook
    next-tag-strategy: rc
    version-md: |
      | Webhook Branch | Webhook Minor | Matching Rancher Version |
      |---|---|---|
      | main | v0.7 | v2.15 |
    deps: []
