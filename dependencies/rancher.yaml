# Source of truth for the dependency DAG and per-repo policy.
#
# kind:
#   leaf        - final consumer (rancher). Receives bump PRs; never bumped
#                 into anything else.
#   paired      - follows VERSION.md mapping to a rancher minor. Bump PRs go
#                 to the branch whose VERSION.md row matches the upstream
#                 minor (e.g. steve release/v0.7 ↔ rancher release/v2.13).
#                 May instead use `branch-template` for repos without a
#                 VERSION.md (see chart below).
#   independent - no rancher pairing. Bump PRs auto-open on `main` only;
#                 release/* branches get Slack-only notice and require the
#                 per-repo `Bump dep` workflow for older-branch bumps.
#
# repo: the GitHub owner/name (e.g. "rancher/wrangler"). Used for all
# clone/PR/API operations. Go module paths are discovered at runtime from
# each repo's go.mod files — no need to declare them here.
#
# fork: optional. When set, bump branches are pushed to this fork and PRs
# are opened as cross-repo PRs (head = "<fork-owner>:<branch>", base on
# repo). Requires the bot token to have push access to the fork.
#
# branch-template: for paired repos whose branches follow a fixed naming
# scheme rather than a VERSION.md table. Only `{rancher-minor}` is
# recognized; it expands to the leaf rancher branch's minor (which already
# carries the "v" prefix, e.g. "v2.16"). For "dev-v2.16" branches, write
# `dev-{rancher-minor}` — not `dev-v{rancher-minor}`.
#
# deps: upstream repos this repo depends on. Each entry is `{name, strategy}`
# where strategy defaults to `go-get` if omitted. Strategies:
#   go-get                          - default; runs `go get module@version`.
#   chart-bump                      - generic chart-bump playground stand-in
#                                     (no longer used by any dep; kept for
#                                     reference until the registry is pruned).
#   bump-webhook                    - runs the rancher-side webhook bump script
#                                     (updates build.yaml, runs `go generate`).
#   chart-bump-webhook              - runs the chart-side webhook bump script
#                                     (updates package.yaml, `make charts`,
#                                     prepends release.yaml).
#   bump-remotedialer-proxy         - runs the rancher-side remotedialer-proxy
#                                     bump script (updates build.yaml,
#                                     regenerates via dapper).
#   chart-bump-remotedialer-proxy   - runs the chart-side remotedialer-proxy
#                                     bump script (updates package.yaml,
#                                     `make charts`, prepends release.yaml).
#   order                           - sequencing-only edge: the downstream waits
#                                     on this dep's bumps to merge before
#                                     opening its own stage, but no in-tree
#                                     action is taken. Drives the cascade DAG;
#                                     ignored by the bump-op auto-dispatch path.

repos:
  rancher:
    kind: leaf
    repo: rancher/rancher
    token-env: GH_TOKEN_RANCHER
    version-md: |
      | Rancher Branch | Rancher Minor |
      |----------------|---------------|
      | main           | v2.15         |
      | release/v2.14  | v2.14         |
      | release/v2.13  | v2.13         |
      | release/v2.12  | v2.12         |
      | release/v2.11  | v2.11         |
      | release/v2.10  | v2.10         |
    deps:
      - {name: apiserver}
      - {name: norman}
      - {name: steve}
      - {name: webhook, strategy: bump-webhook}
      - {name: remotedialer-proxy, strategy: bump-remotedialer-proxy}
      - {name: wrangler}
      - {name: chart, strategy: order}
  chart:
    kind: paired
    repo: rancher/charts
    token-env: GH_TOKEN_CHART
    branch-template: "dev-{rancher-minor}"
    deps:
      - {name: webhook, strategy: chart-bump-webhook}
      - {name: remotedialer-proxy, strategy: chart-bump-remotedialer-proxy}
  remotedialer-proxy:
    kind: paired
    repo: rancher/remotedialer-proxy
    token-env: GH_TOKEN_REMOTEDIALER_PROXY
    next-tag-strategy: rc
    deps:
      - {name: wrangler}
  webhook:
    kind: paired
    repo: rancher/webhook
    token-env: GH_TOKEN_WEBHOOK
    next-tag-strategy: rc
    deps:
      - {name: norman}
      - {name: wrangler}
  steve:
    kind: paired
    repo: rancher/steve
    token-env: GH_TOKEN_STEVE
    deps:
      - {name: apiserver}
      - {name: norman}
      - {name: wrangler}
  apiserver:
    kind: paired
    repo: rancher/apiserver
    token-env: GH_TOKEN_APISERVER
    deps:
      - {name: wrangler}
  norman:
    kind: paired
    repo: rancher/norman
    token-env: GH_TOKEN_NORMAN
    deps:
      - {name: wrangler}
  wrangler:
    kind: independent
    repo: rancher/wrangler
    token-env: GH_TOKEN_WRANGLER
    deps: []
